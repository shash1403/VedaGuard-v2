# VedaGuard — build and test on push / PR
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Contracts & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vedaguard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache poetry
        uses: actions/cache@v4
        with:
          path: vedaguard/.venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('vedaguard/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Pytest
        run: poetry run python -m pytest tests/ -v

      - name: Compile contracts (PuyaPy)
        # --out-dir is relative to the contract file; use ../artifacts from veda_guard/
        run: |
          cd smart_contracts/veda_guard && poetry run puyapy contract.py --out-dir ../artifacts/veda_guard

  frontend:
    name: Parent UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vedaguard/veda-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vedaguard/veda-ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Build
        run: npm run build
